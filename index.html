<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ONE PRO LEAGUE - IMAGE UPLOAD ENABLED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --neon-red: #ff003c; --neon-glow: rgba(255, 0, 60, 0.6); --dark-bg: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: #ffffff; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .red-gradient { background: linear-gradient(135deg, #ff003c 0%, #9e0025 100%); }
        .standing-table { font-size: 10px; width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        .standing-table td { background: rgba(255,255,255,0.02); padding: 10px 5px; text-align: center; border-radius: 4px; }
        .score-box { background: #000; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 900; font-size: 13px; border: 1px solid #222; }
        .score-win { color: #22c55e !important; border-color: rgba(34, 197, 94, 0.4) !important; }
        .score-loss { color: #ef4444 !important; border-color: rgba(239, 68, 68, 0.4) !important; }
        .score-draw { color: #eab308 !important; border-color: rgba(234, 179, 8, 0.4) !important; }
        .glass-header { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .active-round-btn { background: var(--neon-red) !important; color: white !important; }
        .sponsor-slider-container { overflow: hidden; background: #000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); height: 80px; }
        .sponsor-track { display: flex; width: max-content; animation: scroll 30s linear infinite; }
        .sponsor-item { width: 160px; height: 80px; flex-shrink: 0; display: block; border-right: 1px solid rgba(255,255,255,0.05); }
        .sponsor-item img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .upload-btn { border: 2px dashed rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; }
        .upload-btn:hover { border-color: var(--neon-red); background: rgba(255,0,60,0.05); }
    </style>
</head>
<body class="no-scrollbar pb-10">

    <div id="loading-screen" class="fixed inset-0 bg-black z-[2000] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border-2 border-t-red-600 rounded-full animate-spin"></div>
            <p class="text-[10px] uppercase font-black tracking-widest mt-4 text-zinc-500">Syncing Data...</p>
        </div>
    </div>

    <header class="glass-header sticky top-0 z-50 px-5 py-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 red-gradient rounded-lg flex items-center justify-center"><i class="fas fa-trophy text-white text-[10px]"></i></div>
                <h1 class="text-sm font-black italic uppercase">THE ONE <span class="text-red-600">PRO LEAGUE</span></h1>
            </div>
            <div class="flex bg-zinc-900 p-1 rounded-xl">
                <button onclick="showTab('user-view')" id="btn-user" class="px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-red-600">View</button>
                <button onclick="openAdminLogin()" id="btn-admin" class="px-4 py-2 rounded-lg text-[9px] font-black uppercase text-zinc-500">Admin</button>
            </div>
        </div>
    </header>

    <div class="sponsor-slider-container">
        <div id="sponsor-track-list" class="sponsor-track"></div>
    </div>

    <main class="p-4">
        <!-- Admin Panel -->
        <section id="admin-panel" class="tab-content space-y-6">
            <div class="bg-zinc-900/50 rounded-3xl p-6 border border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-black text-red-600 uppercase">Sponsor Editor</h3>
                    <span id="upload-status" class="text-[8px] text-zinc-500 italic uppercase">Ready</span>
                </div>
                <div id="admin-sponsor-config" class="grid grid-cols-2 gap-3"></div>
                <p class="text-[8px] text-zinc-500 mt-3">* Click on a box to change image using Camera/Gallery</p>
            </div>

            <div class="bg-zinc-900/50 rounded-3xl p-6 border border-white/5">
                <h3 class="text-[10px] font-black text-red-600 mb-4 uppercase">Team Entry (48 Players)</h3>
                <textarea id="teamInput" rows="4" class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-xs text-white mb-4 outline-none placeholder-zinc-700" placeholder="Player 1&#10;Player 2..."></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="generateTournamentData()" class="bg-zinc-800 p-4 rounded-xl text-[9px] font-black uppercase">Reset & Create Groups</button>
                    <button id="admin-ko-btn" onclick="advanceToKnockout()" class="bg-zinc-800 p-4 rounded-xl text-[9px] font-black uppercase opacity-50" disabled>Start Knockout</button>
                </div>
            </div>
            <div id="admin-match-list" class="space-y-2 pb-10"></div>
        </section>

        <!-- User View -->
        <section id="user-view" class="tab-content active">
            <div id="user-sub-tabs" class="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800 mb-6 hidden">
                <button onclick="toggleUserSubTab('group')" id="sub-btn-group" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-red-600">Group Stage</button>
                <button onclick="toggleUserSubTab('knockout')" id="sub-btn-knock" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-500">Knockout</button>
            </div>

            <div id="group-stage-content">
                <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 pb-2">
                    <button onclick="filterRound(1)" id="rd-1" class="flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase bg-zinc-900 active-round-btn">Round 1</button>
                    <button onclick="filterRound(2)" id="rd-2" class="flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase bg-zinc-900 text-zinc-500">Round 2</button>
                    <button onclick="filterRound(3)" id="rd-3" class="flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase bg-zinc-900 text-zinc-500">Round 3</button>
                </div>
                <div id="user-fixture-list" class="space-y-4 mb-10"></div>
                <div id="group-tables-container" class="space-y-6"></div>
            </div>

            <div id="knockout-content" class="hidden">
                <div id="knockout-bracket" class="space-y-12"></div>
            </div>
        </section>
    </main>

    <div id="admin-login-modal" class="fixed inset-0 z-[1000] hidden bg-black/95 flex items-center justify-center p-6">
        <div class="bg-zinc-900 w-full max-w-xs rounded-[2rem] p-8 border border-white/5">
            <input type="password" id="adminPasswordInput" class="w-full bg-black border border-zinc-800 rounded-xl p-4 text-center tracking-[1em] mb-4" placeholder="••••">
            <button onclick="attemptLogin()" class="w-full red-gradient rounded-xl p-4 font-black text-[10px] uppercase">Login</button>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="imageInput" accept="image/*" class="hidden">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBO_TmNXPkY2-vvDtcP8j7YX6HU-8lRpV4",
            authDomain: "theoneproleague.firebaseapp.com",
            projectId: "theoneproleague",
            appId: "1:983758717301:web:cac06eddc7160a2049133c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "the-one-neon-v2";

        let state = { 
            teams: [], matches: [], koMatches: [], isKnockoutStarted: false, currentRound: 1, isAdminAuthenticated: false,
            sponsors: [
                {img: "https://picsum.photos/seed/1/320/160", link: "#"},
                {img: "https://picsum.photos/seed/2/320/160", link: "#"},
                {img: "https://picsum.photos/seed/3/320/160", link: "#"},
                {img: "https://picsum.photos/seed/4/320/160", link: "#"}
            ]
        };

        let currentEditingSponsorIndex = null;

        onAuthStateChanged(auth, async (u) => {
            if (!u) await signInAnonymously(auth);
            else {
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'mainData'), (snap) => {
                    if (snap.exists()) { 
                        Object.assign(state, snap.data()); 
                        renderAll(); 
                        renderSponsorEditor(); 
                    }
                    document.getElementById('loading-screen').style.display = 'none';
                });
            }
        });

        // UI & AUTH
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const btns = { 'user-view': 'btn-user', 'admin-panel': 'btn-admin' };
            Object.keys(btns).forEach(k => {
                const btn = document.getElementById(btns[k]);
                if (k === id) { btn.classList.add('bg-red-600'); btn.classList.remove('text-zinc-500'); }
                else { btn.classList.remove('bg-red-600'); btn.classList.add('text-zinc-500'); }
            });
        };
        window.openAdminLogin = () => { if(state.isAdminAuthenticated) showTab('admin-panel'); else document.getElementById('admin-login-modal').classList.remove('hidden'); };
        window.attemptLogin = () => { if(document.getElementById('adminPasswordInput').value === "1234") { state.isAdminAuthenticated = true; document.getElementById('admin-login-modal').classList.add('hidden'); showTab('admin-panel'); } };

        // SPONSOR & IMAGE UPLOAD
        function renderSponsorEditor() {
            const container = document.getElementById('admin-sponsor-config');
            if(!container) return;
            container.innerHTML = state.sponsors.map((s, i) => `
                <div onclick="triggerImageUpload(${i})" class="upload-btn aspect-video bg-black rounded-xl overflow-hidden relative group">
                    <img src="${s.img}" class="w-full h-full object-cover opacity-60 group-hover:opacity-40">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <i class="fas fa-camera text-white/50 text-xl group-hover:text-red-500"></i>
                    </div>
                </div>
            `).join('') + `
                <div onclick="addNewSponsorSlot()" class="upload-btn aspect-video bg-zinc-900/50 rounded-xl flex items-center justify-center">
                    <i class="fas fa-plus text-zinc-700"></i>
                </div>
            `;
        }

        window.triggerImageUpload = (index) => {
            currentEditingSponsorIndex = index;
            document.getElementById('imageInput').click();
        };

        window.addNewSponsorSlot = async () => {
            const newSponsors = [...state.sponsors, { img: "https://picsum.photos/seed/new/320/160", link: "#" }];
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { sponsors: newSponsors });
        };

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || currentEditingSponsorIndex === null) return;

            const status = document.getElementById('upload-status');
            status.innerText = "Processing...";
            status.classList.add('text-yellow-500');

            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result;
                
                // Gemini Vision fallback simulation/optimizing image size
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const optimizedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const newSponsors = [...state.sponsors];
                    newSponsors[currentEditingSponsorIndex].img = optimizedBase64;

                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { sponsors: newSponsors });
                        status.innerText = "Updated!";
                        status.classList.replace('text-yellow-500', 'text-green-500');
                        setTimeout(() => status.innerText = "Ready", 2000);
                    } catch (err) {
                        status.innerText = "Error!";
                        status.classList.replace('text-yellow-500', 'text-red-500');
                    }
                };
                img.src = base64;
            };
            reader.readAsDataURL(file);
        });

        // TOURNAMENT LOGIC
        window.generateTournamentData = async () => {
            const raw = document.getElementById('teamInput').value.split('\n').filter(n => n.trim() !== "");
            if (raw.length !== 48) {
                alert("Please enter exactly 48 players (one per line)");
                return;
            }
            const gNames = "ABCDEFGHIJKL".split("");
            const teams = raw.sort(() => Math.random() - 0.5).map((n, i) => ({ 
                id: i + 1, name: n.trim(), p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0, group: gNames[Math.floor(i / 4)] 
            }));
            const matches = []; let mId = 1;
            gNames.forEach(g => {
                const gt = teams.filter(t => t.group === g);
                [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]].forEach((p, idx) => matches.push({id: mId++, round: Math.floor(idx/2)+1, group: g, home: gt[p[0]].id, away: gt[p[1]].id, hS: null, aS: null}));
            });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { ...state, teams, matches, koMatches: [], isKnockoutStarted: false });
        };

        window.updateScore = async (id, val, side, isKo) => {
            const score = val === "" ? null : parseInt(val);
            let matchData = isKo ? state.koMatches : state.matches;
            const m = matchData.find(x => x.id === id);
            if(side === 'home') m.hS = score; else m.aS = score;

            let t = state.teams.map(x => ({...x, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0}));
            state.matches.forEach(match => {
                if(match.hS !== null && match.aS !== null) {
                    const h = t.find(x => x.id === match.home), a = t.find(x => x.id === match.away);
                    if(!h || !a) return;
                    h.p++; a.p++; h.gf += match.hS; h.ga += match.aS; a.gf += match.aS; a.ga += match.hS;
                    if(match.hS > match.aS) { h.w++; h.pts+=3; a.l++; } else if(match.hS < match.aS) { a.w++; a.pts+=3; h.l++; } else { h.d++; a.d++; h.pts+=1; a.pts+=1; }
                    h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
                }
            });

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { teams: t, matches: state.matches, koMatches: state.koMatches });
        };

        window.renderAll = () => {
            const getCls = (s1, s2) => (s1 === null) ? '' : (s1 > s2 ? 'score-win' : (s1 < s2 ? 'score-loss' : 'score-draw'));
            
            // Sponsors
            const track = document.getElementById('sponsor-track-list');
            if(track && state.sponsors.length > 0) {
                const html = state.sponsors.map(s => `<div class="sponsor-item"><img src="${s.img}"></div>`).join('');
                track.innerHTML = html + html;
            }

            // Fixtures (USER VIEW)
            const fixList = document.getElementById('user-fixture-list');
            if(fixList && state.matches.length > 0) {
                const roundMatches = state.matches.filter(m => m.round === state.currentRound);
                fixList.innerHTML = roundMatches.map(m => `
                    <div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5 flex items-center justify-between">
                        <div class="flex-1 text-right text-[11px] font-semibold truncate pr-3">${state.teams.find(t=>t.id===m.home)?.name || '...'}</div>
                        <div class="flex items-center space-x-1">
                            <div class="score-box ${getCls(m.hS, m.aS)}">${m.hS ?? ''}</div>
                            <div class="score-box ${getCls(m.aS, m.hS)}">${m.aS ?? ''}</div>
                        </div>
                        <div class="flex-1 text-left text-[11px] font-semibold truncate pl-3">${state.teams.find(t=>t.id===m.away)?.name || '...'}</div>
                    </div>`).join('');
            }

            // Tables
            const tableCont = document.getElementById('group-tables-container');
            if(tableCont && state.teams.length > 0) {
                tableCont.innerHTML = "ABCDEFGHIJKL".split("").map(g => {
                    const gt = state.teams.filter(t => t.group === g).sort((a,b) => b.pts - a.pts || b.gd - a.gd);
                    return `<div class="bg-zinc-900/40 p-4 rounded-2xl border border-white/5">
                        <div class="flex justify-between items-center mb-3">
                            <div class="text-[10px] font-black text-red-600 uppercase tracking-widest">GROUP ${g}</div>
                        </div>
                        <table class="standing-table">
                            <thead><tr class="text-zinc-500 uppercase text-[8px] font-black">
                                <th class="text-left pl-2">Team</th><th>P</th><th>GD</th><th>PTS</th>
                            </tr></thead>
                            <tbody>${gt.map((t,i) => `<tr><td class="text-left pl-2 font-semibold">${t.name}</td><td>${t.p}</td><td>${t.gd}</td><td class="font-black text-red-500">${t.pts}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>`;
                }).join('');
            }

            // Admin Match List
            const adminMatchList = document.getElementById('admin-match-list');
            if(adminMatchList) {
                const data = state.isKnockoutStarted ? state.koMatches : state.matches;
                adminMatchList.innerHTML = data.map(m => `
                    <div class="bg-zinc-950 p-3 rounded-xl flex items-center justify-between border border-white/5">
                        <span class="w-10 text-[8px] font-black text-zinc-600 uppercase">${m.stage || 'G-'+m.group}</span>
                        <div class="flex-1 flex items-center justify-center space-x-2">
                            <span class="text-[10px] font-semibold flex-1 text-right truncate text-zinc-400">${state.teams.find(t=>t.id===m.home)?.name || 'TBD'}</span>
                            <input type="number" value="${m.hS ?? ''}" onchange="updateScore(${m.id}, this.value, 'home', ${!!m.stage})" class="w-10 h-10 bg-zinc-900 text-center rounded-lg border border-zinc-800 text-xs font-black">
                            <input type="number" value="${m.aS ?? ''}" onchange="updateScore(${m.id}, this.value, 'away', ${!!m.stage})" class="w-10 h-10 bg-zinc-900 text-center rounded-lg border border-zinc-800 text-xs font-black">
                            <span class="text-[10px] font-semibold flex-1 text-left truncate text-zinc-400">${state.teams.find(t=>t.id===m.away)?.name || 'TBD'}</span>
                        </div>
                    </div>`).join('');
            }

            document.getElementById('admin-ko-btn').disabled = !state.matches.every(m => m.hS !== null);
            document.getElementById('user-sub-tabs').classList.toggle('hidden', !state.isKnockoutStarted);
        };

        window.filterRound = (r) => { 
            state.currentRound = r; 
            document.querySelectorAll('#rd-1, #rd-2, #rd-3').forEach(b => {
                b.classList.remove('active-round-btn', 'text-white');
                b.classList.add('text-zinc-500');
            });
            const activeBtn = document.getElementById('rd-'+r);
            activeBtn.classList.add('active-round-btn', 'text-white');
            activeBtn.classList.remove('text-zinc-500');
            renderAll(); 
        };
    </script>
</body>
</html>
